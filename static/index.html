<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkcode Technologies | Master the Future</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <a href="#" class="logo">LINKCODE TECHNOLOGIES</a>
        <nav class="nav-links">
            <a href="#home">Home</a>
            <a href="#courses">Courses</a>
            <a href="#about">About</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <h1>Master the Future of <br>AI & Coding</h1>
            <p>Accelerate your career with agentic AI training, expert placement counseling, and industry-ready skills.</p>
            <div class="hero-btns">
                <a href="#courses" class="btn-primary">Explore Courses</a>
            </div>
        </section>

        <!-- Course Section dynamic loading -->
        <section id="courses" style="padding: 100px 10%; background: #020617;">
            <h2 style="text-align: center; font-size: 2.5rem; margin-bottom: 50px;">Featured Programs</h2>
            <div id="course-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px;">
                <!-- Dynamically populated -->
            </div>
        </section>

    </main>

    <!-- Chat Widget Integration -->
    <div id="chat-widget-container">
        <div id="chat-bubble">
            <i class="fas fa-comment-dots" style="color: white; font-size: 1.5rem;"></i>
        </div>
        
        <div id="chat-window" class="glass">
            <div class="chat-header">
                <h4 style="margin: 0;">AI Counselor</h4>
                <small style="opacity: 0.8;">Online & Ready to help</small>
            </div>
            
            <div class="chat-body" id="chat-messages">
                <!-- Messages will sync here -->
            </div>
            
            <div class="chat-footer">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="chat-input" placeholder="Ask about courses, fees..." style="flex: 1; padding: 10px; border-radius: 10px; border: none; background: rgba(255,255,255,0.1); color: white; outline: none;">
                    <button id="chat-send" style="background: var(--primary); border: none; color: white; padding: 8px 15px; border-radius: 10px; cursor: pointer;">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/chatbot.js"></script>
</body>
</html>
